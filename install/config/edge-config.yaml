# IntelliOptics 2.5 - Edge Configuration (Production)
# Detector-centric configuration with confidence-based escalation

global_config:
  refresh_rate: 60.0
  confident_audit_rate: 0.00001
  central_web_app_url: "http://cloud-backend:8000"

# Edge inference configuration profiles
edge_inference_configs:
  default:
    enabled: true
    api_token: ${INTELLIOPTICS_API_TOKEN}
    always_return_edge_prediction: false
    disable_cloud_escalation: false
    min_time_between_escalations: 2.0

  offline:
    enabled: true
    api_token: ${INTELLIOPTICS_API_TOKEN}
    always_return_edge_prediction: true
    disable_cloud_escalation: true
    min_time_between_escalations: 0

# Detector configurations
# Add your detectors here. Example:
detectors: {}
  # det_example_001:
  #   detector_id: det_example_001
  #   name: "Example Detector"
  #   edge_inference_config: default
  #   confidence_threshold: 0.85
  #   patience_time: 30.0
  #   mode: OPEN_VOCAB
  #   class_names: ["object"]
  #   hrm_enabled: false

