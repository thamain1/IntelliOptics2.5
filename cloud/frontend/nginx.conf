server {
    listen 80;
    server_name localhost;

    # Disable caching for index.html to always get fresh JS/CSS references
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (they have hashed filenames)
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxying is handled by the outer cloud-nginx reverse proxy.
    # In standalone dev mode, uncomment below:
    # location /api/ {
    #     proxy_pass http://cloud-backend:8000/;
    # }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
